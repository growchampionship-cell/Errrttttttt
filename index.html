<!DOCTYPE html>
<html>
<head>
<title>TikTok Send Coins</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 15px;
  border-bottom: 1px solid #eee;
}

.logo {
  width: 30px;
}

.title {
  margin-left: 10px;
  font-weight: bold;
}

/* PROFILE */
.profile {
  display: flex;
  align-items: center;
  padding: 15px;
  background: #f7f7f7;
  margin: 15px;
  border-radius: 12px;
}

.avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

.profile-info {
  margin-left: 10px;
}

.profile-info input {
  border: none;
  background: transparent;
  font-size: 16px;
  outline: none;
}

.username-display {
  font-size: 14px;
  color: #555;
}

/* COINS */
.coins {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 15px;
}

.coin {
  background: #f2f2f2;
  padding: 15px;
  text-align: center;
  border-radius: 12px;
  cursor: pointer;
}

.coin.active {
  border: 1px solid #ff2c55;
  background: #fff0f3;
}

/* BUTTON */
.btn {
  margin: 15px;
  padding: 14px;
  width: calc(100% - 30px);
  background: #ff2c55;
  color: white;
  border: none;
  border-radius: 12px;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/TikTok_logo.svg" class="logo">
  <div class="title">Send Coins</div>
</div>

<!-- PROFILE -->
<div class="profile">
  <img id="avatar" src="https://i.pravatar.cc/100" class="avatar">
  <div class="profile-info">
    <input id="username" placeholder="Enter username" oninput="updateProfile()">
    <div class="username-display" id="display">@user</div>
  </div>
</div>

<!-- COINS -->
<div class="coins">
  <div class="coin" onclick="select(this,30)">30 🪙</div>
  <div class="coin" onclick="select(this,350)">350 🪙</div>
  <div class="coin" onclick="select(this,700)">700 🪙</div>
  <div class="coin" onclick="select(this,1400)">1400 🪙</div>
  <div class="coin" onclick="select(this,3500)">3500 🪙</div>
  <div class="coin" onclick="select(this,10000)">Custom</div>
</div>

<button class="btn" onclick="send()">Send Coins</button>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <h3>Verification</h3>
    <p id="status">Checking...</p>
    <p id="done"></p>
    <button onclick="closePop()">OK</button>
  </div>
</div>

<script>
let selected = 0;

function updateProfile() {
  let user = document.getElementById("username").value;

  // Update display
  document.getElementById("display").innerText = "@" + user;

  // Generate avatar based on username
  document.getElementById("avatar").src =
    "https://ui-avatars.com/api/?name=" + user + "&background=ff2c55&color=fff";
}

function select(el, amount) {
  document.querySelectorAll('.coin').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selected = amount;
}

function send() {
  let user = document.getElementById("username").value;

  if (!user || selected === 0) {
    alert("Enter user and select coins");
    return;
  }

  document.getElementById("popup").style.display = "flex";
  document.getElementById("status").innerText = "Verifying user...";

  setTimeout(() => {
    document.getElementById("status").innerText = "Sending coins...";
  }, 1000);

  setTimeout(() => {
    document.getElementById("done").innerText =
      "✅ " + selected + " coins sent to @" + user;
  }, 2000);
}

function closePop() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
